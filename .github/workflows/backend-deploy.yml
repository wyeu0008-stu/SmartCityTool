name: Build Push Deploy Backend

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  check-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate imports
        run: |
          python -c "from app.main import app; print('Backend import check passed')"

  push-image:
    if: github.event_name == 'push'
    needs: check-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::969578073158:role/AmazonEC2ContainerRegistryPowerUser
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend Docker image
        env:
          AWS_ACCOUNT_ID: 969578073158
          AWS_REGION: ap-southeast-2
          ECR_REPOSITORY: fit5120/smartcycle-backend
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}
          IMAGE_TAG=${GITHUB_SHA}

          echo "IMAGE_URI=${IMAGE_URI}"
          echo "IMAGE_TAG=${IMAGE_TAG}"

          docker build -t ${IMAGE_URI}:${IMAGE_TAG} ./backend
          docker tag ${IMAGE_URI}:${IMAGE_TAG} ${IMAGE_URI}:latest
          docker push ${IMAGE_URI}:${IMAGE_TAG}
          docker push ${IMAGE_URI}:latest

  deploy:
    if: github.event_name == 'push'
    needs: push-image
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend to EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /opt/myapp/backend
            sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=latest/' .env
            ./deploy.sh
          EOF